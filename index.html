<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Linguaele – Juego</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #30B5AA;
            --primary-dark: #2a9d8f;
            --accent: #FFB627;
            --danger: #e74c3c;
            --success: #27ae60;
            --cream: #f5f7fa;
            --dark: #3E4D5D;
            --card-bg: #ffffff;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--cream);
            min-height: 100vh;
            padding: 0 0 80px;
            color: var(--dark);
        }

        /* ── HEADER ── */
        .header {
            background: white;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .logo {
            font-size: 1.4em;
            font-weight: 800;
            color: var(--dark);
            letter-spacing: -0.5px;
        }

        .logo span { color: var(--primary); }

        .streak {
            background: #fff5e0;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9em;
        }

        /* ── STATS BAR ── */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 14px;
        }

        .stat-card {
            background: white;
            padding: 12px 8px;
            border-radius: 12px;
            text-align: center;
            box-shadow: var(--shadow);
            border-bottom: 3px solid var(--primary);
        }

        .stat-card .val {
            font-size: 1.4em;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-card small {
            display: block;
            font-size: 0.75em;
            color: #888;
            margin-top: 2px;
        }

        /* ── XP PROGRESS ── */
        .xp-bar-wrap {
            padding: 0 14px 14px;
        }

        .xp-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            color: #888;
            margin-bottom: 5px;
        }

        .xp-bar {
            background: #e0e4e8;
            border-radius: 99px;
            height: 8px;
            overflow: hidden;
        }

        .xp-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            border-radius: 99px;
            transition: width 0.6s ease;
        }

        /* ── CATEGORY HEADERS ── */
        .cat-label {
            margin: 6px 14px 8px;
            font-weight: 700;
            color: var(--primary);
            border-left: 4px solid var(--accent);
            padding-left: 10px;
            font-size: 0.9em;
            letter-spacing: 0.3px;
        }

        /* ── MISSION GRID ── */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 0 14px;
            margin-bottom: 4px;
        }

        .card {
            background: white;
            padding: 16px 12px;
            border-radius: 14px;
            text-align: center;
            border: 2px solid transparent;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: transform 0.15s ease, border-color 0.15s ease;
            position: relative;
            overflow: hidden;
        }

        .card:active { transform: scale(0.96); }

        .card.done {
            border-color: var(--success);
            opacity: 0.85;
        }

        .card.done::after {
            content: '✓';
            position: absolute;
            top: 6px;
            right: 8px;
            color: var(--success);
            font-weight: 800;
            font-size: 0.85em;
        }

        .card-emoji { font-size: 2em; margin-bottom: 4px; }

        .card-name {
            font-size: 0.78em;
            font-weight: 700;
            color: var(--dark);
        }

        .card-level {
            display: inline-block;
            font-size: 0.65em;
            background: var(--cream);
            color: #888;
            padding: 2px 6px;
            border-radius: 6px;
            margin-top: 4px;
            font-weight: 600;
        }

        /* ── MODAL ── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            align-items: flex-end;
            justify-content: center;
            z-index: 100;
            padding: 0;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: white;
            padding: 24px 20px 32px;
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-width: 480px;
            animation: slideUp 0.25s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .modal-emoji { font-size: 3em; text-align: center; margin-bottom: 8px; }

        .modal-title {
            font-size: 1.2em;
            font-weight: 800;
            text-align: center;
            color: var(--dark);
            margin-bottom: 4px;
        }

        .modal-desc {
            text-align: center;
            color: #666;
            font-size: 0.95em;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .modal-hint {
            background: #f0faf9;
            border-left: 4px solid var(--primary);
            padding: 8px 12px;
            border-radius: 0 8px 8px 0;
            font-size: 0.82em;
            color: #555;
            margin-bottom: 14px;
        }

        .modal input {
            width: 100%;
            padding: 13px 14px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        .modal input:focus { border-color: var(--primary); }

        .modal input.correct { border-color: var(--success); background: #f0fff4; }
        .modal input.wrong   { border-color: var(--danger);  background: #fff5f5; }

        .feedback {
            min-height: 28px;
            text-align: center;
            font-weight: 700;
            font-size: 0.9em;
            margin: 10px 0 6px;
            transition: opacity 0.3s;
        }

        .feedback.success { color: var(--success); }
        .feedback.error   { color: var(--danger); }

        .btn {
            display: block;
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.1s, opacity 0.1s;
            font-family: inherit;
        }

        .btn:active { transform: scale(0.97); opacity: 0.9; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #f0f0f0; color: #555; }

        /* ── ACHIEVEMENT TOAST ── */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--dark);
            color: white;
            padding: 12px 20px;
            border-radius: 14px;
            font-size: 0.9em;
            font-weight: 600;
            white-space: nowrap;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 200;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Lingua<span>ele</span></div>
        <div class="streak" id="streakBadge">🔥 1</div>
    </div>

    <div class="stats">
        <div class="stat-card"><div class="val" id="xpVal">0</div><small>XP</small></div>
        <div class="stat-card"><div class="val" id="levelVal">A1</div><small>Nivel</small></div>
        <div class="stat-card"><div class="val" id="logrosVal">0</div><small>Logros</small></div>
    </div>

    <div class="xp-bar-wrap">
        <div class="xp-label">
            <span id="xpCurLabel">0 XP</span>
            <span id="xpNextLabel">Próximo: A2 (50 XP)</span>
        </div>
        <div class="xp-bar"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
    </div>

    <div id="game-content"></div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content" id="modalBody"></div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
    // ── LEVEL THRESHOLDS ──────────────────────────────────────────────
    const LEVELS = [
        { name: 'A1', min: 0,   max: 50  },
        { name: 'A2', min: 50,  max: 150 },
        { name: 'B1', min: 150, max: 300 },
        { name: 'B2', min: 300, max: 500 },
        { name: 'C1', min: 500, max: 999 },
    ];

    // ── MISSION DATA ──────────────────────────────────────────────────
    const MISSIONS = [
        // Profesional
        { id: 1,  cat: 'Profesional', n: 'Aduana',      e: '✈️',  level: 'A1',
          q: '¿Cuál es el motivo de tu viaje?',
          hint: 'Responde con la razón del viaje. Ej: "turismo"',
          valid: ['turismo','negocios','vacaciones','trabajo','estudio'], xp: 10,
          logro: 'Viajero Experimentado' },

        { id: 2,  cat: 'Profesional', n: 'Entrevista',  e: '💼',  level: 'B1',
          q: 'He ___ en una escuela internacional.',
          hint: 'Verbo "trabajar" en pretérito perfecto (participio)',
          valid: ['trabajado'], xp: 15,
          logro: 'Candidato Competitivo' },

        { id: 3,  cat: 'Profesional', n: 'Reunión',     e: '📊',  level: 'B1',
          q: '¿___ presentar el informe hoy?',
          hint: 'Verbo modal para obligación (poder / deber / tener que)',
          valid: ['puedes','puede','puedo','debes','deberías','tienes que'], xp: 15,
          logro: 'Profesional Seguro' },

        { id: 4,  cat: 'Profesional', n: 'Email',       e: '📧',  level: 'A2',
          q: 'Me ___ en contacto con usted.',
          hint: 'Verbo "ponerse" conjugado (1ª persona singular presente)',
          valid: ['pongo'], xp: 10,
          logro: 'Comunicador Eficaz' },

        // Emergencias
        { id: 5,  cat: 'Emergencias', n: 'Médico',      e: '🏥',  level: 'A2',
          q: 'Me ___ la cabeza.',
          hint: 'Verbo "doler" conjugado (3ª persona singular)',
          valid: ['duele'], xp: 10,
          logro: 'Paciente Independiente' },

        { id: 6,  cat: 'Emergencias', n: 'Policía',     e: '🚨',  level: 'A1',
          q: '¡Necesito ___!',
          hint: 'Palabra para pedir socorro urgente',
          valid: ['ayuda','socorro','auxilio'], xp: 10,
          logro: 'Héroe Urbano' },

        { id: 7,  cat: 'Emergencias', n: 'Farmacia',    e: '💊',  level: 'A2',
          q: '¿Tiene algo para el ___?',
          hint: 'Escribe un síntoma o enfermedad común (dolor, resfriado, fiebre…)',
          valid: ['dolor','resfriado','fiebre','estómago','tos','gripe','catarro'], xp: 10,
          logro: 'Viajero Sano' },

        { id: 8,  cat: 'Emergencias', n: 'Accidente',   e: '🚗',  level: 'B1',
          q: 'Ha ___ un accidente en la calle.',
          hint: 'Verbo "haber" + participio de "ocurrir"',
          valid: ['ocurrido','habido','pasado','sucedido'], xp: 15,
          logro: 'Ciudadano Responsable' },

        // Social
        { id: 9,  cat: 'Social',      n: 'Presentarse', e: '👋',  level: 'A1',
          q: '___ llamo Ana. ¿Y tú?',
          hint: 'Pronombre reflexivo para presentarse',
          valid: ['me'], xp: 10,
          logro: 'Sociable' },

        { id: 10, cat: 'Social',      n: 'Restaurante', e: '🍽️', level: 'A1',
          q: 'Quisiera ___ la carta, por favor.',
          hint: 'Verbo para solicitar algo que te traigan',
          valid: ['ver','pedir','tener'], xp: 10,
          logro: 'Gourmet Local' },

        { id: 11, cat: 'Social',      n: 'Disculparse', e: '🙏',  level: 'A1',
          q: '___ usted, ¿dónde está la estación?',
          hint: 'Expresión de cortesía para interrumpir a alguien',
          valid: ['perdone','disculpe','perdón','disculpa','oiga'], xp: 10,
          logro: 'Cortés y Educado' },

        { id: 12, cat: 'Social',      n: 'Invitación',  e: '🥂',  level: 'A2',
          q: '¿___ venir a la fiesta el sábado?',
          hint: 'Verbo modal de posibilidad (2ª persona singular)',
          valid: ['puedes','podrías','quieres'], xp: 10,
          logro: 'Anfitrión Perfecto' },

        // Viajes
        { id: 13, cat: 'Viajes',      n: 'Hotel',       e: '🏨',  level: 'A1',
          q: 'Tengo una ___ a nombre de García.',
          hint: 'Sustantivo: reserva o confirmación de habitación',
          valid: ['reserva','reservación','habitación'], xp: 10,
          logro: 'Viajero Cómodo' },

        { id: 14, cat: 'Viajes',      n: 'Transporte',  e: '🚌',  level: 'A1',
          q: '¿A qué ___ sale el próximo autobús?',
          hint: 'Sustantivo que indica la hora de salida',
          valid: ['hora','tiempo','horario'], xp: 10,
          logro: 'Viajero Puntual' },

        { id: 15, cat: 'Viajes',      n: 'Compras',     e: '🛍️', level: 'A2',
          q: '¿Cuánto ___ esto?',
          hint: 'Verbo "costar" en 3ª persona singular presente',
          valid: ['cuesta','vale'], xp: 10,
          logro: 'Comprador Inteligente' },

        { id: 16, cat: 'Viajes',      n: 'Dirección',   e: '🗺️', level: 'A2',
          q: 'Gira a la ___ en el semáforo.',
          hint: 'Una de las dos direcciones laterales',
          valid: ['derecha','izquierda'], xp: 10,
          logro: 'Explorador Urbano' },
    ];

    // ── STATE ─────────────────────────────────────────────────────────
    let state = loadState();

    function loadState() {
        try {
            const s = JSON.parse(localStorage.getItem('linguaele_state') || '{}');
            return {
                xp:       s.xp       || 0,
                done:     s.done     || [],
                streak:   s.streak   || 1,
                lastDate: s.lastDate || null,
            };
        } catch { return { xp: 0, done: [], streak: 1, lastDate: null }; }
    }

    function saveState() {
        localStorage.setItem('linguaele_state', JSON.stringify(state));
    }

    function getLevel(xp) {
        for (let i = LEVELS.length - 1; i >= 0; i--) {
            if (xp >= LEVELS[i].min) return LEVELS[i];
        }
        return LEVELS[0];
    }

    // ── STREAK LOGIC ──────────────────────────────────────────────────
    (function checkStreak() {
        const today = new Date().toDateString();
        if (state.lastDate && state.lastDate !== today) {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            if (state.lastDate !== yesterday.toDateString()) {
                state.streak = 1; // reset if missed a day
            } else {
                state.streak++;
            }
        }
        state.lastDate = today;
        saveState();
    })();

    // ── UI RENDERERS ──────────────────────────────────────────────────
    function updateStats() {
        const lv = getLevel(state.xp);
        const lvNext = LEVELS[LEVELS.indexOf(lv) + 1];
        const pct = lvNext
            ? Math.round(((state.xp - lv.min) / (lvNext.min - lv.min)) * 100)
            : 100;

        document.getElementById('xpVal').textContent = state.xp;
        document.getElementById('levelVal').textContent = lv.name;
        document.getElementById('logrosVal').textContent = state.done.length;
        document.getElementById('streakBadge').textContent = `🔥 ${state.streak}`;
        document.getElementById('xpFill').style.width = pct + '%';
        document.getElementById('xpCurLabel').textContent = state.xp + ' XP';
        document.getElementById('xpNextLabel').textContent = lvNext
            ? `Próximo: ${lvNext.name} (${lvNext.min} XP)`
            : '¡Nivel máximo!';
    }

    function render() {
        updateStats();
        const container = document.getElementById('game-content');
        const cats = [...new Set(MISSIONS.map(m => m.cat))];
        let html = '';

        cats.forEach(cat => {
            html += `<div class="cat-label">${cat}</div><div class="grid">`;
            MISSIONS.filter(m => m.cat === cat).forEach(m => {
                const done = state.done.includes(m.id);
                html += `
                    <div class="card${done ? ' done' : ''}" onclick="openModal(${m.id})">
                        <div class="card-emoji">${m.e}</div>
                        <div class="card-name">${m.n}</div>
                        <div class="card-level">${m.level}</div>
                    </div>`;
            });
            html += `</div>`;
        });

        container.innerHTML = html;
    }

    // ── MODAL ─────────────────────────────────────────────────────────
    function openModal(id) {
        const m = MISSIONS.find(x => x.id === id);
        const already = state.done.includes(m.id);

        document.getElementById('modalBody').innerHTML = `
            <div class="modal-emoji">${m.e}</div>
            <div class="modal-title">${m.n} <span style="font-size:0.6em;color:#aaa;font-weight:600">${m.level}</span></div>
            <div class="modal-desc">${m.q}</div>
            <div class="modal-hint">💡 ${m.hint}</div>
            <input type="text" id="ans" placeholder="Tu respuesta…" autocomplete="off"
                   autocapitalize="none" spellcheck="false"
                   onkeydown="if(event.key==='Enter') validar(${m.id})">
            <div class="feedback" id="feedback"></div>
            <button class="btn btn-primary" id="checkBtn" onclick="validar(${m.id})">Comprobar ✓</button>
            <button class="btn btn-secondary" onclick="cerrar()">Cerrar</button>
        `;

        if (already) {
            setFeedback('¡Ya completaste esta misión! Puedes repasar.', 'success');
        }

        document.getElementById('modal').classList.add('active');
        setTimeout(() => document.getElementById('ans').focus(), 300);
    }

    function setFeedback(msg, type) {
        const fb = document.getElementById('feedback');
        if (!fb) return;
        fb.textContent = msg;
        fb.className = `feedback ${type}`;
    }

    function validar(id) {
        const m = MISSIONS.find(x => x.id === id);
        const ans = (document.getElementById('ans').value || '').toLowerCase().trim();
        const input = document.getElementById('ans');

        if (!ans) {
            setFeedback('Escribe algo primero.', 'error');
            return;
        }

        const correct = m.valid.some(v => ans.includes(v));

        if (correct) {
            input.className = 'correct';
            const isNew = !state.done.includes(m.id);
            if (isNew) {
                state.xp += m.xp;
                state.done.push(m.id);
                saveState();
                const prevLevel = getLevel(state.xp - m.xp).name;
                const newLevel  = getLevel(state.xp).name;
                if (newLevel !== prevLevel) {
                    showToast(`🎓 ¡Subiste a nivel ${newLevel}!`);
                } else {
                    showToast(`🏅 Logro: ${m.logro}  +${m.xp} XP`);
                }
            } else {
                setFeedback('¡Correcto! (ya tenías este logro)', 'success');
            }
            document.getElementById('checkBtn').textContent = 'Siguiente →';
            document.getElementById('checkBtn').onclick = cerrar;
            if (isNew) setFeedback('¡Excelente! +' + m.xp + ' XP', 'success');
            render();
        } else {
            input.className = 'wrong';
            const hint = m.valid[0];
            setFeedback(`Intenta de nuevo. Pista: "${hint}…"`, 'error');
        }
    }

    function cerrar() {
        document.getElementById('modal').classList.remove('active');
    }

    // ── TOAST ─────────────────────────────────────────────────────────
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ── CLOSE ON BACKDROP ─────────────────────────────────────────────
    document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target === this) cerrar();
    });

    // ── INIT ──────────────────────────────────────────────────────────
    render();
    </script>
</body>
</html>
